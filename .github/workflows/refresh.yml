name: Refresh results & odds

# Auto-fetch new results, re-learn, and refresh the odds. Opt-in: set the
# repository secret FOOTBALL_DATA_API_KEY (free key from football-data.org).
# Without the secret the job no-ops, so it is safe to leave enabled.
on:
  schedule:
    - cron: "0 6 * * *"     # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[api]"
      - name: Fetch results, re-learn, refresh odds
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          if [ -z "$FOOTBALL_DATA_API_KEY" ]; then
            echo "FOOTBALL_DATA_API_KEY not set — skipping auto-refresh."
            exit 0
          fi
          wcpredict fetch-results || true
          wcpredict replay --quiet || true
          python scripts/sweepstakes.py || true
      - name: Commit any changes
        run: |
          git config user.name "wc-predictor-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto-refresh results & odds"
          git push || true
